<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corpocrea</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Corporate Palette
              corp: {
                black: '#25282A',
                green: '#1D3C34',
                gold: '#CBA052',
                blue: '#A2B2C8',
              },
              // Overrides to apply corporate identity to existing utility classes
              blue: {
                50: '#f2f7f6', // Very light green tint
                100: '#e6efed',
                200: '#cce0dc',
                300: '#A2B2C8', // Corp Blue/Grey
                400: '#5c857b',
                500: '#2d5c50',
                600: '#1D3C34', // Corp Green (Primary Brand)
                700: '#152e28',
                800: '#0e1f1b',
                900: '#25282A', // Corp Black
              },
              indigo: {
                50: '#fbf8f1',
                100: '#f5efe0',
                200: '#ebdcb8',
                500: '#d4af6b',
                600: '#CBA052', // Corp Gold (Secondary Brand)
                700: '#b08b45',
                800: '#8f6e30',
                900: '#1D3C34', // Corp Green
              },
              slate: {
                800: '#25282A', // Corp Black
                900: '#1a1c1d', // Darker Black
              }
            },
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Montserrat', sans-serif;
      }
      /* Custom scrollbar for dashboard */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #A2B2C8; /* Corp Blue */
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #1D3C34; /* Corp Green */
      }
    </style>

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0"
  }
}
</script>
